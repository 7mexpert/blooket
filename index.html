<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tassomai</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(135deg, #4e54c8, #8f94fb);
    margin: 0;
  }
  .container {
    background: #fff;
    padding: 40px 60px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
  }
  h1 {
    margin-bottom: 30px;
    color: #333;
  }
  .btn {
    display: inline-block;
    margin: 10px;
    padding: 15px 25px;
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    background: #4e54c8;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
    text-decoration: none;
  }
  .btn:hover:not(:disabled) {
    transform: scale(1.05);
    background: #6c63ff;
  }
  .btn:disabled {
    background: #888;  /* Greyed out */
    cursor: not-allowed;
    transform: none;
  }
</style>
</head>
<body>
<div class="container">
  <h1>RG Blooket Addons</h1>
  <button class="btn" disabled>Download Extension</button>
  <button class="btn" id="downloadZip">Download Unpacked</button>
  <a href="https://pastebin.com/raw/HC50CWGC" class="btn" target="_blank">Copy Code</a>
</div>

<script>
  document.getElementById('downloadZip').addEventListener('click', function() {
    const link = document.createElement('a');
    link.href = 'files/BlooketAddons.zip'; // Put your zip file path here
    link.download = 'BlooketAddons.zip';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });
</script>
</body>
</html>
